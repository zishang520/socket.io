name: Go CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOPROXY: https://proxy.golang.org,direct

jobs:
  lint:
    name: Lint Modules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "parsers/engine"
          - "parsers/socket"
          - "servers/engine"
          - "servers/socket"
          - "adapters/adapter"
          - "adapters/postgres"
          - "adapters/redis"
          - "clients/engine"
          - "clients/socket"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "**/go.sum"

      - name: Run make deps
        run: make deps

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          working-directory: ${{ matrix.module }}
          args: --timeout=5m --config=${{ github.workspace }}/.golangci.yml

  build-and-test:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "**/go.sum"

      - name: Start Redis with Password and No-Save
        run: |
          docker run -d -p 6379:6379 --name ci-redis redis:alpine \
            redis-server --requirepass root --save "" --appendonly no

      - name: Wait for Redis to be ready
        run: |
          for i in {1..10}; do
            if echo "PING" | nc -w 2 localhost 6379 > /dev/null; then
              echo "Redis is ready";
              break;
            fi;
            echo "Waiting for Redis...";
            sleep 3;
          done

      - name: Test
        run: |
          make test
